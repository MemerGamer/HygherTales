name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: "googleapis/release-please-action@v4"
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: windows-latest
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (Windows)
        run: bun run build:sidecar -- --target=windows
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/src-tauri/tauri.conf.json
        shell: pwsh

      - name: Generate Windows icon (icon.ico)
        run: |
          bun run generate-icon-ico
          if (!(Test-Path src-tauri/icons/icon.ico)) {
            Write-Error "icon.ico was not created at src-tauri/icons/icon.ico"
            Get-ChildItem -Path src-tauri/icons -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
        working-directory: apps/desktop
        shell: pwsh

      - name: Build desktop (Windows)
        run: bun run build
        working-directory: apps/desktop

      - name: Upload Windows artifacts to release
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $bundle = "apps/desktop/src-tauri/target/release/bundle"
          if (Test-Path $bundle) {
            Get-ChildItem -Path $bundle -Recurse -File | ForEach-Object { gh release upload $tag $_.FullName }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (macOS)
        run: bun run build:sidecar -- --target=macos
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "

      - name: Generate macOS icon (icon.icns)
        run: bun run tauri icon src-tauri/icons/icon.png
        working-directory: apps/desktop

      - name: Build desktop (macOS)
        run: bun run build
        working-directory: apps/desktop

      - name: Upload macOS artifacts to release
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          find "$BUNDLE" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -exec gh release upload "$TAG" {} \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 squashfs-tools

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (Linux)
        run: bun run build:sidecar -- --target=linux
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "

      - name: Generate icon.ico
        run: bun run generate-icon-ico
        working-directory: apps/desktop

      - name: Enable FUSE for AppImage
        run: |
          sudo modprobe fuse
          sudo chmod a+rw /dev/fuse

      - name: Patch linuxdeploy patchelf (fix Bun sidecar corruption)
        # linuxdeploy bundles patchelf 0.8 which corrupts large Bun self-contained binaries.
        # After patchelf 0.8 modifies the sidecar, ldd fails on it and the GTK plugin aborts.
        # Fix: extract linuxdeploy, replace its patchelf with the system version (0.14+),
        # and repack it so Tauri picks up the patched copy from cache.
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/tauri

          # Pre-download linuxdeploy into Tauri's cache so the build step uses our patched copy.
          curl -sSfL -o ~/.cache/tauri/linuxdeploy-x86_64.AppImage \
            "https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage"
          chmod +x ~/.cache/tauri/linuxdeploy-x86_64.AppImage

          # Locate the squashfs filesystem inside the AppImage (no FUSE required).
          # Parse the ELF section-header table to find where the runtime binary ends,
          # then search for the squashfs magic bytes from that point onward.
          # Scanning from byte 0 produces false positives (hsqs appears inside the ELF itself).
          OFFSET=$(python3 -c "
import struct
path = '$HOME/.cache/tauri/linuxdeploy-x86_64.AppImage'
data = open(path, 'rb').read()
e_shoff     = struct.unpack_from('<Q', data, 40)[0]
e_shentsize = struct.unpack_from('<H', data, 58)[0]
e_shnum     = struct.unpack_from('<H', data, 60)[0]
min_off = (e_shoff + e_shentsize * e_shnum) if e_shnum else 65536
for off in range(min_off, len(data) - 4):
    if data[off:off+4] in (b'hsqs', b'sqsh'):
        print(off)
        break
          ")
          echo "squashfs offset: $OFFSET"

          # Extract, patch patchelf, repack.
          unsquashfs -o "$OFFSET" -d /tmp/linuxdeploy-extracted ~/.cache/tauri/linuxdeploy-x86_64.AppImage
          cp /usr/bin/patchelf /tmp/linuxdeploy-extracted/usr/bin/patchelf
          echo "patchelf in repacked linuxdeploy: $(/tmp/linuxdeploy-extracted/usr/bin/patchelf --version)"

          curl -sSfL -o /tmp/appimage-runtime \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-x86_64"
          mksquashfs /tmp/linuxdeploy-extracted /tmp/linuxdeploy-new.squashfs \
            -root-owned -noappend -comp xz -b 1048576 2>&1 | tail -3
          cat /tmp/appimage-runtime /tmp/linuxdeploy-new.squashfs \
            > ~/.cache/tauri/linuxdeploy-x86_64.AppImage
          chmod +x ~/.cache/tauri/linuxdeploy-x86_64.AppImage

          echo "Patched linuxdeploy: $(APPIMAGE_EXTRACT_AND_RUN=1 ~/.cache/tauri/linuxdeploy-x86_64.AppImage --version)"

      - name: Compile desktop (Linux)
        run: bun run build -- --no-bundle
        working-directory: apps/desktop

      - name: Bundle deb and rpm
        run: bunx tauri bundle --bundles deb,rpm
        working-directory: apps/desktop

      - name: Bundle AppImage
        run: bunx tauri bundle --bundles appimage --verbose
        working-directory: apps/desktop
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: true

      - name: Upload Linux artifacts to release
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          find "$BUNDLE" -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \) -exec gh release upload "$TAG" {} \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-proxy-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"

      - name: Set up Docker Buildx
        uses: "docker/setup-buildx-action@v3"

      - name: Build proxy Docker image
        uses: "docker/build-push-action@v6"
        with:
          context: .
          file: apps/proxy/Dockerfile
          push: false
          load: true
          tags: "hyghertales-proxy:${{ needs.release-please.outputs.version }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload proxy image artifact
        run: |
          docker save hyghertales-proxy:${{ needs.release-please.outputs.version }} | gzip > proxy-image.tar.gz
          gh release upload "${{ needs.release-please.outputs.tag_name }}" proxy-image.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: "googleapis/release-please-action@v4"
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: windows-latest
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (Windows)
        run: bun run build:sidecar -- --target=windows
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content apps/desktop/src-tauri/tauri.conf.json
        shell: pwsh

      - name: Generate Windows icon (icon.ico)
        run: |
          bun run generate-icon-ico
          if (!(Test-Path src-tauri/icons/icon.ico)) {
            Write-Error "icon.ico was not created at src-tauri/icons/icon.ico"
            Get-ChildItem -Path src-tauri/icons -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
        working-directory: apps/desktop
        shell: pwsh

      - name: Build desktop (Windows)
        run: bun run build
        working-directory: apps/desktop

      - name: Upload Windows artifacts to release
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $bundle = "apps/desktop/src-tauri/target/release/bundle"
          if (Test-Path $bundle) {
            Get-ChildItem -Path $bundle -Recurse -File | ForEach-Object { gh release upload $tag $_.FullName }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (macOS)
        run: bun run build:sidecar -- --target=macos
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "

      - name: Generate macOS icon (icon.icns)
        run: bun run tauri icon src-tauri/icons/icon.png
        working-directory: apps/desktop

      - name: Build desktop (macOS)
        run: bun run build
        working-directory: apps/desktop

      - name: Upload macOS artifacts to release
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          find "$BUNDLE" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -exec gh release upload "$TAG" {} \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-packages:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Mark repo as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (Linux)
        run: bun run build:sidecar -- --target=linux
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "

      - name: Generate icon.ico
        run: bun run generate-icon-ico
        working-directory: apps/desktop

      - name: Compile desktop (Linux)
        run: bun run build -- --no-bundle
        working-directory: apps/desktop

      - name: Bundle deb and rpm
        run: bunx tauri bundle --bundles deb,rpm
        working-directory: apps/desktop

      - name: Upload deb and rpm to release
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BUNDLE="apps/desktop/src-tauri/target/release/bundle"
          find "$BUNDLE" -type f \( -name "*.deb" -o -name "*.rpm" \) -exec gh release upload "$TAG" {} \;
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-flatpak:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-22.04
    environment: release
    steps:
      - uses: "actions/checkout@v4"

      - name: Mark repo as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: "oven-sh/setup-bun@v2"

      - name: Install Rust
        uses: "dtolnay/rust-toolchain@stable"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build
        working-directory: packages/shared

      - name: Build proxy sidecar (Linux)
        run: bun run build:sidecar -- --target=linux
        working-directory: apps/proxy
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Sync version to Tauri
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(path, 'utf8'));
            c.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "

      - name: Generate icon.ico
        run: bun run generate-icon-ico
        working-directory: apps/desktop

      - name: Compile desktop (Linux)
        run: bun run build -- --no-bundle
        working-directory: apps/desktop

      - name: Build deb (Flatpak source)
        run: bunx tauri bundle --bundles deb
        working-directory: apps/desktop

      - name: Stage .deb for Flatpak manifest
        run: |
          mkdir -p apps/desktop/flatpak/files
          cp apps/desktop/src-tauri/target/release/bundle/deb/*.deb \
             apps/desktop/flatpak/files/app.deb

      - name: Build Flatpak
        uses: "flatpak/flatpak-github-actions/flatpak-builder@v6"
        with:
          bundle: HygherTales.flatpak
          manifest-path: apps/desktop/flatpak/com.hyghertales.desktop.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak to release
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" HygherTales.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-proxy-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"

      - name: Set up Docker Buildx
        uses: "docker/setup-buildx-action@v3"

      - name: Build proxy Docker image
        uses: "docker/build-push-action@v6"
        with:
          context: .
          file: apps/proxy/Dockerfile
          push: false
          load: true
          tags: "hyghertales-proxy:${{ needs.release-please.outputs.version }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload proxy image artifact
        run: |
          docker save hyghertales-proxy:${{ needs.release-please.outputs.version }} | gzip > proxy-image.tar.gz
          gh release upload "${{ needs.release-please.outputs.tag_name }}" proxy-image.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

id: com.hyghertales.desktop

runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk

command: hyghertales-desktop

finish-args:
  - --socket=wayland
  - --socket=x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --filesystem=home
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1

modules:
  - name: hyghertales
    buildsystem: simple

    sources:
      - type: file
        path: files/app.deb

    build-commands:
      - set -e

      # Extract the .deb
      - mkdir deb-extract
      - ar -x app.deb --output deb-extract
      - tar -C deb-extract -xf deb-extract/data.tar.gz

      # Main binary
      - install -Dm755 deb-extract/usr/bin/hyghertales-desktop /app/bin/hyghertales-desktop

      # Sidecar and any bundled libs placed by Tauri under /usr/lib/<app>/
      - |
        if [ -d deb-extract/usr/lib/hyghertales-desktop ]; then
          mkdir -p /app/lib/hyghertales-desktop
          cp -r deb-extract/usr/lib/hyghertales-desktop/. /app/lib/hyghertales-desktop/
          find /app/lib/hyghertales-desktop -type f -exec chmod 755 {} \;
        fi

      # Desktop file — find whatever .desktop Tauri generated, rewrite Icon=, install it
      - |
        desktop_file=$(find deb-extract/usr/share/applications -name '*.desktop' 2>/dev/null | head -1)
        if [ -n "$desktop_file" ]; then
          sed -i 's|^Icon=.*|Icon=com.hyghertales.desktop|' "$desktop_file"
          install -Dm644 "$desktop_file" /app/share/applications/com.hyghertales.desktop.desktop
        else
          mkdir -p /app/share/applications
          printf '[Desktop Entry]\nName=HygherTales\nExec=hyghertales-desktop\nIcon=com.hyghertales.desktop\nType=Application\nCategories=Utility;Game;\n' \
            > /app/share/applications/com.hyghertales.desktop.desktop
        fi

      # Icons — copy Tauri-generated sizes up to 512x512 (Flatpak rejects larger)
      - |
        find deb-extract/usr/share/icons/hicolor -name '*.png' 2>/dev/null | while read f; do
          size_dir=$(echo "$f" | sed 's|.*/hicolor/\([^/]*\)/.*|\1|')
          w=$(echo "$size_dir" | sed 's/[^0-9].*//')
          if [ -n "$w" ] && [ "$w" -le 512 ]; then
            install -Dm644 "$f" "/app/share/icons/hicolor/$size_dir/apps/com.hyghertales.desktop.png" || true
          fi
        done

